<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cert Master Password Reset</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5efe3;
            --panel: rgba(255, 252, 247, 0.92);
            --text: #182230;
            --muted: #5f6c7d;
            --accent: #0f3d57;
            --accent-hover: #0b2d40;
            --accent-soft: #dcebf3;
            --border: rgba(24, 34, 48, 0.12);
            --shadow: rgba(24, 34, 48, 0.12);
            --success-bg: #ecfdf3;
            --success-text: #166534;
            --error-bg: #fef2f2;
            --error-text: #991b1b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(197, 127, 23, 0.15), transparent 28%),
                radial-gradient(circle at top right, rgba(15, 61, 87, 0.18), transparent 22%),
                linear-gradient(180deg, #fdf7ea 0%, var(--bg) 52%, #f1eadc 100%);
            color: var(--text);
            padding: 1.2rem;
        }

        main {
            width: min(874px, 100%);
            margin: 0 auto;
        }

        .top-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            align-items: center;
            margin-bottom: 1.2rem;
            padding: 0.95rem 1rem;
            background: rgba(255, 252, 247, 0.78);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 18px 36px rgba(24, 34, 48, 0.08);
            backdrop-filter: blur(10px);
        }

        .top-links-label {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-right: 0.2rem;
        }

        .top-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 0.9rem;
            border-radius: 999px;
            border: 1px solid rgba(24, 34, 48, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: 0 26px 54px var(--shadow);
            padding: 1.6rem;
            backdrop-filter: blur(10px);
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 0.9rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 0.8rem;
            font-family: Georgia, "Times New Roman", serif;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
        }

        label {
            display: block;
            margin-top: 0.85rem;
            font-weight: 700;
            color: #334155;
        }

        input, button {
            width: 100%;
            margin-top: 0.4rem;
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        input {
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
        }

        button {
            margin-top: 1rem;
            background: var(--accent);
            color: white;
            font-weight: 700;
            cursor: pointer;
            border-color: var(--accent);
        }

        button:hover { background: var(--accent-hover); }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e3a8a;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .status.success {
            background: var(--success-bg);
            border-color: #bbf7d0;
            color: var(--success-text);
        }

        .status.error {
            background: var(--error-bg);
            border-color: #fecaca;
            color: var(--error-text);
        }
    </style>
</head>
<body>
    <main>
        <nav class="top-links" aria-label="Site pages">
            <span class="top-links-label">Pages</span>
            <a class="top-link" href="/">Home</a>
            <a class="top-link" href="/account.html">Account</a>
            <a class="top-link" href="/quiz.html">Quiz</a>
            <a class="top-link" href="/register.html">Register</a>
            <a class="top-link" href="/result-home.html">Results</a>
            <a class="top-link" href="/manage.html">Manage</a>
            <a class="top-link" href="/verify-email.html">Verify Email</a>
        </nav>

        <section class="panel">
            <div class="eyebrow">The Cert Master</div>
            <h1>Reset your password</h1>
            <p>Set a new password for the account tied to this reset link.</p>

            <form id="resetForm">
                <label for="email">Email address</label>
                <input type="email" id="email" autocomplete="email" required />

                <label for="newPassword">New password</label>
                <input type="password" id="newPassword" autocomplete="new-password" required />

                <label for="confirmPassword">Confirm new password</label>
                <input type="password" id="confirmPassword" autocomplete="new-password" required />

                <button type="submit">Reset password</button>
            </form>

            <div id="status" class="status" role="status" aria-live="polite">Checking your password reset link...</div>
        </section>
    </main>

    <script>
        const statusBox = document.getElementById("status");
        const form = document.getElementById("resetForm");
        const emailInput = document.getElementById("email");

        function setStatus(message, tone = "info") {
            statusBox.className = `status${tone === "info" ? "" : " " + tone}`;
            statusBox.textContent = message;
        }

        function parseApiMessage(text, status, fallbackMessage) {
            if (!text) {
                if (status === 429) return "Too many requests were sent. Please wait a moment and try again.";
                return fallbackMessage || `Request failed with status ${status}.`;
            }

            try {
                const parsed = JSON.parse(text);
                if (typeof parsed === "string" && parsed.trim()) return parsed.trim();
                if (Array.isArray(parsed)) {
                    const messages = parsed
                        .map(item => item?.description || item?.Description || item?.message || item?.Message)
                        .filter(Boolean);
                    if (messages.length) return messages.join("; ");
                }

                return parsed.detail || parsed.title || parsed.message || parsed.Message || text;
            } catch {
                return text;
            }
        }

        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");
        const code = params.get("code");

        if (!email || !code) {
            setStatus("Password reset link is incomplete. Please use the full link from your email.", "error");
            form.style.display = "none";
        } else {
            emailInput.value = email;
            setStatus("Choose your new password below.");
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            setStatus("Resetting your password...");

            try {
                const response = await fetch("/api/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        code,
                        newPassword,
                        confirmPassword
                    })
                });

                const text = await response.text();
                if (!response.ok) {
                    setStatus(parseApiMessage(text, response.status, "Password reset failed."), "error");
                    return;
                }

                let message = "Password reset successfully.";
                try {
                    const parsed = JSON.parse(text);
                    message = parsed.message || message;
                } catch {}

                form.reset();
                emailInput.value = email || "";
                setStatus(message, "success");
            } catch (error) {
                setStatus(error.message || "Password reset could not be completed right now.", "error");
            }
        });
    </script>
</body>
</html>
